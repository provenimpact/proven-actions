name: Skill Stats

on:
  push:
    branches: [main]
    paths:
      - ".opencode/skills/**"
      - "action.yml"
      - "src/**"
      - "dist/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Agent Skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run skill-stats (dogfood)
        uses: ./
        id: stats
        with:
          path: .opencode/skills
          badge-output-dir: ./badges

      - name: Publish badges to gist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GIST_SECRET: ${{ secrets.GIST_SECRET }}
          GIST_ID: ${{ vars.GIST_ID }}
        run: |
          if [ -z "$GIST_SECRET" ] || [ -z "$GIST_ID" ]; then
            echo "::warning::GIST_SECRET or GIST_ID not configured — skipping badge publish"
            exit 0
          fi

          # Build JSON payload with all badge files
          FILES_JSON="{"
          first=true
          for badge in badges/*-badge.json; do
            [ -f "$badge" ] || continue
            name="$(basename "$badge")"
            content="$(jq -c '.' "$badge")"
            if [ "$first" = true ]; then
              first=false
            else
              FILES_JSON+=","
            fi
            FILES_JSON+="\"$name\":{\"content\":$(jq -Rs '.' <<< "$content")}"
          done
          FILES_JSON+="}"

          # Update the gist via GitHub API
          curl -sf -X PATCH \
            -H "Authorization: token $GIST_SECRET" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/$GIST_ID" \
            -d "{\"files\":$FILES_JSON}" > /dev/null

          echo "Badges published to gist $GIST_ID"
